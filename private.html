<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTR Technologies - Espace Personnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap');
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .neon-text { text-shadow: 0 0 20px #67e8f9; }
    </style>
</head>
<body class="bg-[#05080f] text-slate-200 min-h-screen">

    <!-- ÉCRAN MOT DE PASSE -->
    <div id="password-screen" class="min-h-screen flex items-center justify-center">
        <div class="max-w-md w-full px-6">
            <div class="text-center mb-10">
                <img src="assets/logo.png" alt="GTR" class="mx-auto h-20 mb-6">
                <h1 class="text-4xl font-bold title-font tracking-tight neon-text">Espace Personnel</h1>
                <p class="text-cyan-300 mt-2">GTR Technologies</p>
            </div>
            <div class="bg-[#111827] p-10 rounded-3xl border border-cyan-900">
                <p class="text-sm text-slate-400 mb-4">Mot de passe</p>
                <input type="password" id="password-input" 
                       class="w-full bg-[#1f2937] border border-cyan-800 focus:border-cyan-400 rounded-2xl px-6 py-4 text-lg outline-none transition-all"
                       placeholder="••••••••••">
                <button onclick="checkPassword()" 
                        class="mt-6 w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-4 rounded-2xl transition-all">
                    ACCÉDER
                </button>
                <p id="error-msg" class="text-red-400 text-center mt-4 text-sm hidden">Mot de passe incorrect</p>
            </div>
            <p class="text-center text-xs text-slate-500 mt-8">Mot de passe temporaire : GTR-Tech</p>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL (caché au départ) -->
    <div id="main-content" class="hidden min-h-screen">
        <nav class="bg-[#05080f]/90 backdrop-blur border-b border-cyan-900 px-6 py-5 fixed w-full z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="assets/logo.png" alt="Logo" class="h-8">
                    <span class="title-font text-2xl font-bold tracking-tighter">GTR</span>
                </div>
                <button onclick="logout()" class="text-sm text-slate-400 hover:text-white">Déconnexion</button>
            </div>
        </nav>

        <div class="pt-24 pb-16 px-6 max-w-6xl mx-auto">
            <h1 class="text-5xl font-bold title-font tracking-tight text-center mb-4">Bienvenue, Guy</h1>
            <p class="text-cyan-300 text-center mb-16">Espace personnel • GTR Technologies</p>

            <!-- Microsoft 365 -->
            <div class="mb-16">
                <h2 class="text-xl uppercase tracking-widest text-cyan-400 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-microsoft"></i> MICROSOFT 365
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <a href="https://www.office.com/?auth=2" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group">
                        <i class="fa-solid fa-globe text-4xl text-cyan-400 mb-4"></i>
                        <p class="font-semibold text-xl">M365</p>
                    </a>
                    <a href="https://outlook.office.com/mail" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group">
                        <i class="fa-solid fa-envelope text-4xl text-cyan-400 mb-4"></i>
                        <p class="font-semibold text-xl">Outlook</p>
                    </a>
                    <a href="https://gtrtechnologiescom-my.sharepoint.com/" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group">
                        <i class="fa-solid fa-cloud text-4xl text-cyan-400 mb-4"></i>
                        <p class="font-semibold text-xl">OneDrive</p>
                    </a>
                </div>
            </div>

            <!-- AI -->
            <div class="mb-16">
                <h2 class="text-xl uppercase tracking-widest text-cyan-400 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-brain"></i> INTELLIGENCE ARTIFICIELLE
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <a href="https://grok.com/" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group">
                        <p class="font-semibold text-xl mb-1">Grok</p>
                        <p class="text-slate-400">xAI</p>
                    </a>
                    <a href="https://gemini.google.com/" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group">
                        <p class="font-semibold text-xl mb-1">Gemini</p>
                        <p class="text-slate-400">Google</p>
                    </a>
                </div>
            </div>

            <!-- Développement -->
            <div>
                <h2 class="text-xl uppercase tracking-widest text-cyan-400 mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-code"></i> DÉVELOPPEMENT
                </h2>
                <a href="https://github.com/guygtr/" target="_blank" class="bg-[#111827] hover:bg-[#1f2937] border border-cyan-900 hover:border-cyan-400 p-8 rounded-3xl transition-all group inline-block">
                    <i class="fa-brands fa-github text-4xl mb-4"></i>
                    <p class="font-semibold text-xl">GitHub</p>
                    <p class="text-slate-400">guygtr</p>
                </a>
            </div>
        </div>
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('password-input').value;
            const error = document.getElementById('error-msg');
            if (input === "GTR-Tech" || input === "gtr-tech") {
                document.getElementById('password-screen').classList.add('hidden');
                document.getElementById('main-content').classList.remove('hidden');
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 2500);
            }
        }
        document.getElementById('password-input').addEventListener('keypress', e => { if (e.key === 'Enter') checkPassword(); });

        function logout() {
            if (confirm('Déconnexion ?')) {
                document.getElementById('main-content').classList.add('hidden');
                document.getElementById('password-screen').classList.remove('hidden');
                document.getElementById('password-input').value = '';
            }
        }
        tailwind.config = { content: [] };
    </script>
</body>
</html>
